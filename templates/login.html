<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='public/favicon.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@^2.0/dist/tailwind.min.css" rel="stylesheet">
    <script>
        (function() {
            const themeMedia = window.matchMedia('(prefers-color-scheme: dark)');

            function getDefaultTheme() {
                return themeMedia.matches ? 'dark' : 'light';
            }

            function applyTheme() {
                const activeTheme = getDefaultTheme();
                document.documentElement.dataset.theme = activeTheme;
                document.documentElement.style.colorScheme = activeTheme;
            }

            if (themeMedia.addEventListener) {
                themeMedia.addEventListener('change', applyTheme);
            } else if (themeMedia.addListener) {
                themeMedia.addListener(applyTheme);
            }

            applyTheme();
        })();
    </script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #f9fafb;
            color: #374151;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .login-main {
            flex: 1 0 auto;
            flex-direction: column;
            gap: 1.25rem;
            padding: 2rem;
        }

        .login-brand {
            flex-shrink: 0;
            width: 100%;
            max-width: 24rem;
            justify-content: center;
            padding: 2rem !important;
        }

        .login-card {
            min-width: 0;
            max-width: 24rem;
        }

        .site-logo {
            transition: filter 0.2s ease;
        }

        html[data-theme="dark"] body {
            background-color: #111827;
            color: #d1d5db;
        }

        html[data-theme="dark"] .bg-white {
            background-color: #1f2937 !important;
        }

        html[data-theme="dark"] .text-gray-800,
        html[data-theme="dark"] .text-gray-700,
        html[data-theme="dark"] .text-gray-600 {
            color: #e5e7eb !important;
        }

        html[data-theme="dark"] input {
            background-color: #111827 !important;
            border-color: #4b5563 !important;
            color: #f3f4f6 !important;
        }

        html[data-theme="dark"] input::placeholder {
            color: #9ca3af !important;
        }

        html[data-theme="dark"] .shadow,
        html[data-theme="dark"] .shadow-md {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.45), 0 4px 6px -4px rgba(0, 0, 0, 0.45) !important;
        }

        html[data-theme="dark"] .site-logo {
            filter: brightness(0) invert(1);
        }

        footer {
            margin-top: auto;
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .login-main {
                padding: 1.5rem;
            }

            .login-brand {
                padding: 1.75rem !important;
            }
        }

        @media (max-width: 420px) {
            .login-main {
                padding: 1rem;
            }

            .login-brand {
                padding: 1.5rem !important;
            }

            .login-brand > div {
                width: 100%;
            }
        }
    </style>
</head>
<body class="bg-['url_for('static', filename='public/wiggle.svg')]">
<div class="login-main flex justify-center items-center">
    <header class="login-brand flex items-center bg-white shadow rounded-lg">
        <!-- Logo: Ensure the logo is accessible from the public folder -->
        <div class="flex flex-col items-center text-center gap-3">
            <img src="{{ url_for('static', filename='public/logo-vermicelli.svg') }}" alt="Vermicelli Logo" class="site-logo h-16 w-16 rounded-full">
            <!-- Title and Subtitle in a single line -->
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Vermicelli</h1>
                <p class="text-sm text-gray-600">Application Version Control Automation</p>
            </div>
        </div>
    </header>
    <div class="login-card w-full max-w-xs">
        <form action="/login" method="post" class="bg-white shadow-md rounded-lg px-8 pt-6 pb-8">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="username">
                    Username
                </label>
                <input class="shadow appearance-none border rounded-md w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="username" type="text" placeholder="Username" name="username" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">
                    Password
                </label>
                <input class="shadow appearance-none border rounded-md w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline" id="password" type="password" placeholder="******************" name="password" required>
            </div>
            <div class="flex items-center justify-between">
                <button class="hover:bg-yellow-200 hover:text-yellow-800 group flex items-center rounded-md bg-yellow-100 text-yellow-600 text-sm font-medium px-4 py-2" type="submit">
                    Sign In
                </button>
            </div>
            {% if registration_open %}
            <p class="mt-4 text-sm text-gray-600">
                First setup?
                <a href="{{ url_for('register') }}" class="text-yellow-600 hover:text-yellow-700 hover:underline">Register super admin</a>
            </p>
            {% endif %}
        </form>
    </div>
</div>
    <!-- Footer -->
    <footer class="bg-white footer-shadow w-full px-12 py-5 flex items-center justify-center">
        <a href="https://github.com/namig7/vermicelli" target="_blank" rel="noopener noreferrer" class="flex items-center space-x-2">
            <img src="{{ url_for('static', filename='public/logo-vermicelli.svg') }}" alt="Vermicelli Logo" class="site-logo h-6 w-6 rounded-full">
            <span class="text-gray-600">© 2022-2026 Vermicelli</span>
        </a>
    </footer>
</body>
</html>
