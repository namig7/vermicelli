<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vermicelli Dashboard</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='public/favicon.ico') }}">
    <!-- Include Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        (function() {
            const storedTheme = localStorage.getItem('themePreference');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const initialTheme = storedTheme === 'dark' || storedTheme === 'light'
                ? storedTheme
                : storedTheme === 'system'
                    ? (prefersDark ? 'dark' : 'light')
                : (prefersDark ? 'dark' : 'light');
            document.documentElement.dataset.theme = initialTheme;
            document.documentElement.style.colorScheme = initialTheme;
        })();
    </script>

    <style>
        /* Apply box-sizing globally */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        /* Ensure the html always shows the vertical scrollbar */
        html {
            overflow-y: scroll;
        }

        /* Ensure the body takes full height and uses Flexbox */
        body, html {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #f9fafb;
            color: #374151;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .app-shell-header {
            gap: 1rem;
        }

        .app-shell-brand {
            min-width: 0;
        }

        .app-shell-nav {
            flex-wrap: wrap;
            justify-content: flex-end;
            row-gap: 0.75rem;
            gap: 1.5rem;
        }

        .app-shell-nav > * {
            margin-left: 0 !important;
        }

        .app-content {
            flex: 1 0 auto;
            min-width: 0;
            width: 100%;
            overflow-wrap: break-word;
        }

        .app-content a {
            overflow-wrap: anywhere;
        }

        .page-toolbar {
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem !important;
        }

        .page-toolbar nav {
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .page-toolbar nav > * {
            margin-left: 0 !important;
        }

        .toolbar-actions {
            min-width: 0;
            gap: 0.75rem;
        }

        .toolbar-actions > * {
            margin-left: 0 !important;
        }

        .toolbar-search {
            min-width: 12rem;
        }

        .primary-action,
        .pagination-button {
            flex-shrink: 0;
            white-space: nowrap;
        }

        .primary-action svg,
        .pagination-button svg {
            flex-shrink: 0;
        }

        .responsive-table-wrap {
            overflow: hidden;
            border-radius: 0.75rem;
            margin-top: 1.25rem !important;
            margin-bottom: 1.25rem !important;
        }

        .responsive-table {
            table-layout: fixed;
            width: 100%;
        }

        .responsive-table th,
        .responsive-table td {
            vertical-align: middle;
            line-height: 1.35;
        }

        .responsive-table th:not(.col-id):not(.col-access):not(.col-actions),
        .responsive-table td:not(.col-id):not(.col-access):not(.col-actions) {
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .responsive-table .col-id,
        .responsive-table .col-access,
        .responsive-table .col-actions {
            white-space: nowrap;
        }

        .responsive-table .col-access {
            width: 5.75rem;
            text-align: center;
        }

        .responsive-table .col-access,
        .responsive-table .col-actions {
            padding-left: 0.75rem !important;
            padding-right: 0.75rem !important;
        }

        .responsive-name-link {
            display: block;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .table-actions {
            display: grid;
            grid-template-columns: repeat(2, 2.25rem);
            align-items: center;
            gap: 0.35rem;
            justify-content: center;
        }

        .table-actions-three {
            grid-template-columns: repeat(3, 2.25rem);
        }

        .table-action-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2.25rem;
            height: 2.25rem;
            border-radius: 9999px;
            flex: 0 0 auto;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .table-action-button:hover {
            background-color: #fef3c7;
        }

        .table-action-button svg {
            flex-shrink: 0;
        }

        .users-table-section {
            display: flex;
            min-height: 500px;
            flex-direction: column;
        }

        .users-table-list {
            flex-grow: 1;
        }

        .users-table-wrap {
            flex: 0 0 auto;
        }

        .user-status-dot {
            display: inline-flex;
            width: 0.625rem;
            height: 0.625rem;
            border-radius: 9999px;
            background-color: #f59e0b;
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.18), 0 0 10px rgba(245, 158, 11, 0.38);
        }

        .user-status-dot.is-disabled {
            background-color: #9ca3af;
            box-shadow: 0 0 0 2px rgba(156, 163, 175, 0.18), 0 0 7px rgba(107, 114, 128, 0.32);
        }

        .version-icon {
            transition: filter 0.2s ease;
        }

        .user-menu {
            position: relative;
        }

        .user-avatar-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2.25rem;
            height: 2.25rem;
            border-radius: 9999px;
            background-color: #f59e0b;
            color: #ffffff;
            font-weight: 700;
            line-height: 1;
            box-shadow: 0 1px 3px rgba(180, 83, 9, 0.35);
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
        }

        .user-avatar-button:hover,
        .user-avatar-button[aria-expanded="true"] {
            background-color: #d97706;
        }

        .user-dropdown {
            position: absolute;
            top: calc(100% + 0.75rem);
            right: 0;
            z-index: 60;
            min-width: 14rem;
            overflow: hidden;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            background-color: #ffffff;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.16), 0 4px 6px -4px rgba(0, 0, 0, 0.16);
        }

        .user-dropdown.hidden {
            display: none;
        }

        .user-dropdown-name {
            padding: 0.875rem 1rem;
            border-bottom: 1px solid #e5e7eb;
            font-size: 0.875rem;
            font-weight: 600;
            color: #374151;
            overflow-wrap: anywhere;
        }

        .user-dropdown-link {
            display: block;
            width: 100%;
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 0.875rem;
            color: #4b5563;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .user-dropdown-link:hover {
            background-color: #fef3c7;
            color: #92400e;
        }

        .tab-link {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .tab-link.active {
            background-color: #fef3c7;
            color: #b45309;
        }
        .tab-link:hover {
            background-color: #fef3c7;
            color: #b45309;
        }

        .surface {
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(17, 24, 39, 0.08), 0 2px 4px -2px rgba(17, 24, 39, 0.08);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 2.5rem;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            font-weight: 600;
            line-height: 1.25rem;
            white-space: nowrap;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
        }

        .hidden,
        .btn.hidden {
            display: none !important;
        }

        .btn:focus {
            outline: 2px solid transparent;
            outline-offset: 2px;
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.35);
        }

        .btn-primary {
            background-color: #fef3c7;
            color: #b45309;
            box-shadow: 0 1px 2px rgba(180, 83, 9, 0.12);
        }

        .btn-primary:hover {
            background-color: #fde68a;
            color: #92400e;
        }

        .btn-primary svg {
            color: currentColor !important;
        }

        .btn-secondary {
            border: 1px solid #e5e7eb;
            background-color: #ffffff;
            color: #4b5563;
        }

        .btn-secondary:hover {
            background-color: #f9fafb;
            color: #111827;
        }

        .btn-danger {
            background-color: #fee2e2;
            color: #b91c1c;
        }

        .btn-danger:hover {
            background-color: #fecaca;
            color: #991b1b;
        }

        .btn-success {
            background-color: #dcfce7;
            color: #15803d;
        }

        .btn-success:hover {
            background-color: #bbf7d0;
            color: #166534;
        }

        .btn-info {
            background-color: #dbeafe;
            color: #1d4ed8;
        }

        .btn-info:hover {
            background-color: #bfdbfe;
            color: #1e40af;
        }

        .btn-sm {
            min-height: 2rem;
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
            line-height: 1rem;
        }

        .settings-tab-button {
            white-space: normal;
        }

        .settings-tab-button.btn-primary svg {
            color: #ffffff !important;
        }

        .icon-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2.25rem;
            height: 2.25rem;
            border-radius: 9999px;
            color: #6b7280;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .icon-button:hover {
            background-color: #fef3c7;
            color: #b45309;
        }

        .icon-button-danger:hover {
            background-color: #fee2e2;
            color: #dc2626;
        }

        .form-control,
        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            background-color: #ffffff;
            color: #374151;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            line-height: 1.25rem;
            box-shadow: 0 1px 2px rgba(17, 24, 39, 0.05);
        }

        .app-content input:not([type="hidden"]):not([type="checkbox"]):not([type="radio"]),
        .app-content textarea,
        .app-content select {
            border-radius: 0.375rem;
            font-size: 0.875rem;
            line-height: 1.25rem;
        }

        .form-control:focus,
        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            border-color: #f59e0b;
            outline: none;
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.22);
        }

        .modal-panel {
            border-radius: 0.5rem;
            background-color: #ffffff;
            box-shadow: 0 20px 25px -5px rgba(17, 24, 39, 0.18), 0 8px 10px -6px rgba(17, 24, 39, 0.18);
        }

        .modal-header,
        .modal-footer {
            background-color: #f9fafb;
            border-color: #e5e7eb;
        }

        /* Footer Styling */
        .footer-shadow {
            box-shadow: 0 -5px 10px -5px rgba(0, 0, 0, 0.1);
        }

        /* Prevent footer from shrinking or growing */
        footer {
            max-width: 100%;
            width: 100%;
            box-sizing: border-box;
            margin-top: auto;
            flex-shrink: 0; /* Prevents footer from shrinking */
        }

        @media (max-width: 1024px) {
            .app-shell-header {
                padding-left: 1.5rem !important;
                padding-right: 1.5rem !important;
            }

            .app-content {
                padding-left: 1.5rem !important;
                padding-right: 1.5rem !important;
            }

            #content-area > .container {
                max-width: 100%;
            }
        }

        @media (max-width: 768px) {
            .app-shell-header {
                align-items: flex-start !important;
            }

            .app-shell-nav {
                width: 100%;
                justify-content: flex-start;
                column-gap: 1rem;
            }

            .page-toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .page-toolbar nav,
            .toolbar-actions,
            .toolbar-search {
                width: 100%;
            }

            .toolbar-actions {
                display: grid !important;
                grid-template-columns: minmax(0, 1fr) auto;
                column-gap: 0.75rem;
            }

            #paginationControls,
            .pagination-controls {
                gap: 0.75rem;
            }

            #pageNumbers,
            .pagination-page-numbers {
                flex-wrap: wrap;
                justify-content: center;
            }

            .responsive-table .hide-sm {
                display: none !important;
            }
        }

        @media (max-width: 640px) {
            .app-shell-header {
                padding-left: 1rem !important;
                padding-right: 1rem !important;
            }

            .app-shell-brand h1 {
                font-size: 1.5rem !important;
                line-height: 2rem !important;
            }

            .app-shell-brand p {
                font-size: 0.75rem !important;
                line-height: 1rem !important;
            }

            .app-content {
                padding: 1rem !important;
            }

            #content-area > .container {
                padding-left: 1rem !important;
                padding-right: 1rem !important;
            }

            .toolbar-actions {
                grid-template-columns: 1fr;
                row-gap: 0.75rem;
            }

            .primary-action {
                justify-content: center;
                width: 100%;
            }

            .responsive-table th,
            .responsive-table td {
                padding-left: 0.75rem !important;
                padding-right: 0.75rem !important;
                font-size: 0.875rem !important;
            }

            .responsive-table .col-id {
                width: 4rem !important;
            }

            .responsive-table .col-access {
                width: 4.75rem !important;
            }

            .responsive-table .col-actions {
                width: 5.5rem !important;
            }

        }

        @media (max-width: 420px) {
            .app-shell-nav {
                gap: 0.5rem;
            }

            .theme-toggle-button {
                width: 1.75rem;
                height: 1.75rem;
            }

            .tab-link {
                padding-left: 0.75rem;
                padding-right: 0.75rem;
            }
        }

        /* Override SweetAlert2's overflow hidden and padding-right on body */
        body.swal2-shown {
            overflow: scroll !important; /* Maintain scrollbar */
            padding-right: 0 !important; /* Remove any added padding */
        }

        .theme-toggle {
            display: inline-flex;
            align-items: center;
            position: relative;
            gap: 0.25rem;
            padding: 0.25rem;
            border: 1px solid #e5e7eb;
            border-radius: 9999px;
            background-color: #f9fafb;
            color: #4b5563;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.04);
            transition: background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .theme-toggle-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            border-radius: 9999px;
            color: #6b7280;
            background-color: transparent;
            transition: background-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
        }

        .theme-toggle-button:hover {
            background-color: #fef3c7;
            color: #b45309;
        }

        .theme-toggle-button.active {
            background-color: #f59e0b;
            color: #ffffff;
            box-shadow: 0 1px 3px rgba(180, 83, 9, 0.35);
        }

        .theme-toggle-button:focus {
            outline: 2px solid transparent;
            outline-offset: 2px;
            box-shadow: 0 0 0 2px #f59e0b;
        }

        html[data-theme="dark"] body {
            background-color: #111827;
            color: #d1d5db;
        }

        html[data-theme="dark"] .bg-white,
        html[data-theme="dark"] .swal2-popup.bg-white,
        html[data-theme="dark"] .surface,
        html[data-theme="dark"] .modal-panel {
            background-color: #1f2937 !important;
        }

        html[data-theme="dark"] .bg-gray-50,
        html[data-theme="dark"] .hover\:bg-gray-50:hover {
            background-color: #111827 !important;
        }

        html[data-theme="dark"] .bg-gray-100,
        html[data-theme="dark"] .hover\:bg-gray-100:hover {
            background-color: #374151 !important;
        }

        html[data-theme="dark"] .bg-gray-200,
        html[data-theme="dark"] .hover\:bg-gray-200:hover {
            background-color: #4b5563 !important;
        }

        html[data-theme="dark"] .border-gray-200,
        html[data-theme="dark"] .border-gray-300 {
            border-color: #4b5563 !important;
        }

        html[data-theme="dark"] .text-gray-900,
        html[data-theme="dark"] .text-gray-800,
        html[data-theme="dark"] .text-gray-700,
        html[data-theme="dark"] .text-gray-600,
        html[data-theme="dark"] .text-gray-500,
        html[data-theme="dark"] .hover\:text-gray-900:hover,
        html[data-theme="dark"] .hover\:text-gray-600:hover,
        html[data-theme="dark"] .text-black,
        html[data-theme="dark"] .text-black-500 {
            color: #e5e7eb !important;
        }

        html[data-theme="dark"] .text-gray-300 {
            color: #d1d5db !important;
        }

        html[data-theme="dark"] .text-gray-400 {
            color: #cbd5e1 !important;
        }

        html[data-theme="dark"] svg {
            color: currentColor;
        }

        html[data-theme="dark"] .site-logo {
            filter: brightness(0) invert(1);
        }

        html[data-theme="dark"] .version-icon {
            filter: brightness(0) invert(1);
        }

        html[data-theme="dark"] .user-dropdown {
            background-color: #1f2937;
            border-color: #4b5563;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.45), 0 4px 6px -4px rgba(0, 0, 0, 0.45);
        }

        html[data-theme="dark"] .user-dropdown-name {
            border-color: #4b5563;
            color: #e5e7eb;
        }

        html[data-theme="dark"] .user-dropdown-link {
            color: #e5e7eb;
        }

        html[data-theme="dark"] .user-dropdown-link:hover {
            background-color: #374151;
            color: #fef3c7;
        }

        html[data-theme="dark"] input,
        html[data-theme="dark"] textarea,
        html[data-theme="dark"] select,
        html[data-theme="dark"] button[aria-haspopup="listbox"],
        html[data-theme="dark"] .form-input,
        html[data-theme="dark"] .form-select,
        html[data-theme="dark"] .form-textarea {
            background-color: #111827 !important;
            border-color: #4b5563 !important;
            color: #f3f4f6 !important;
        }

        html[data-theme="dark"] input::placeholder,
        html[data-theme="dark"] textarea::placeholder {
            color: #9ca3af !important;
        }

        html[data-theme="dark"] .shadow,
        html[data-theme="dark"] .shadow-md,

        html[data-theme="dark"] .footer-shadow {
            box-shadow: 0 -5px 10px -5px rgba(0, 0, 0, 0.55);
        }

        html[data-theme="dark"] .theme-toggle {
            background-color: #0f172a;
            border-color: #475569;
            color: #d1d5db;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.45);
        }

        html[data-theme="dark"] .theme-toggle-button {
            color: #e5e7eb;
        }

        html[data-theme="dark"] .theme-toggle-button:hover {
            background-color: #334155;

        }

        html[data-theme="dark"] .theme-toggle-button.active {

        html[data-theme="dark"] .table-action-button:hover {

        html[data-theme="dark"] .user-status-dot {
            background-color: #f59e0b;
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.22), 0 0 12px rgba(245, 158, 11, 0.52);
        }

        html[data-theme="dark"] .user-status-dot.is-disabled {
            background-color: #6b7280;
            box-shadow: 0 0 0 2px rgba(156, 163, 175, 0.22), 0 0 8px rgba(107, 114, 128, 0.42);

        html[data-theme="dark"] .admin-access-summary-text {
            color: #dbeafe;

            background-color: rgba(30, 58, 138, 0.78);
            border-color: #60a5fa;

        html[data-theme="dark"] .admin-access-summary-user {
            color: #dbeafe;
        }

        html[data-theme="dark"] .admin-access-summary-user:hover {
            color: #fde68a;
        }

        html[data-theme="dark"] .admin-access-summary-icon {
            color: #93c5fd;
        }

        html[data-theme="dark"] .tab-link.active {
            background-color: #f59e0b;
            color: #111827;
        }

        html[data-theme="dark"] .btn-primary {
            background-color: #f59e0b;
            color: #111827;
        }

        html[data-theme="dark"] .btn-primary:hover {
            background-color: #fbbf24;
            color: #111827;
        }

        html[data-theme="dark"] .btn-secondary {
            background-color: #111827;
            border-color: #4b5563;
            color: #e5e7eb;
        }

        html[data-theme="dark"] .btn-secondary:hover {

    <style>
        .spinner {
          border: 4px solid rgba(0, 0, 0, 0.1);
          width: 36px;
          height: 36px;
          border-radius: 50%;
          border-left-color: #f59e0b; /* оттенок yellow-500 */
          animation: spin 1s linear infinite;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
</head>
<body data-initial-page="{{ initial_page | default('applications') }}" data-app-id="{{ app_id or '' }}">
    <!-- Header -->
    <header class="app-shell-header flex items-center justify-between px-12 py-6 bg-white shadow-lg">
        <div class="app-shell-brand flex items-center">
            <a href="/">
                <img src="{{ url_for('static', filename='public/logo-vermicelli.svg') }}" alt="Vermicelli Logo" class="site-logo h-12 w-12 rounded-full mr-4">
            </a>
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Vermicelli</h1>
                <p class="text-sm text-gray-500">Application Version Control Automation</p>
            </div>
        </div>
        <nav class="app-shell-nav flex items-center space-x-6 text-gray-700">
            <div class="theme-toggle" role="group" aria-label="Theme preference">
                <button type="button" class="theme-toggle-button" data-theme-value="system" aria-label="Use system theme" title="System theme">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 5.25A2.25 2.25 0 0 1 6 3h12a2.25 2.25 0 0 1 2.25 2.25v8.5A2.25 2.25 0 0 1 18 16H6a2.25 2.25 0 0 1-2.25-2.25v-8.5Zm0 13.5h16.5" />
                    </svg>
                </button>
                <button type="button" class="theme-toggle-button" data-theme-value="dark" aria-label="Use dark mode" title="Dark mode">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0 1 18 15.75 9.75 9.75 0 0 1 8.25 6c0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25 9.75 9.75 0 0 0 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
                    </svg>
                </button>
                <button type="button" class="theme-toggle-button" data-theme-value="light" aria-label="Use light mode" title="Light mode">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
                    </svg>
                </button>
            </div>
            <a href="/" class="text-gray-700 hover:text-gray-900 transition">Home</a>
            <a href="https://github.com/namig7/vermicelli/wiki" target="_blank" rel="noopener noreferrer" class="text-gray-700 hover:text-gray-900 transition">Help</a>
            <a href="/about" class="text-gray-700 hover:text-gray-900 transition">About</a>
            {% if current_user %}
            <div class="user-menu">
                <button type="button"
                        id="userMenuButton"
                        class="user-avatar-button"
                        aria-label="Open account menu"
                        aria-expanded="false"
                        aria-controls="userMenuDropdown">
                    {{ current_user.username[:1] | upper }}
                </button>
                <div id="userMenuDropdown" class="user-dropdown hidden">
                    <div class="user-dropdown-name">{{ current_user.full_name or current_user.username }}</div>
                    <a href="/settings" data-page="settings" class="user-dropdown-link">Account Settings</a>
                    {% if can_manage_users %}
                    <a href="/users" data-page="users" class="user-dropdown-link">Users</a>
                    {% endif %}
                    <a href="{{ url_for('logout') }}" class="user-dropdown-link">Sign out</a>
                </div>
            </div>
            {% else %}
            <a href="{{ url_for('logout') }}" class="hover:text-gray-900 transition">Sign out</a>
            {% endif %}
        </nav>
    </header>

    <!-- Main Content Area -->
    <div id="content-area" class="app-content container mx-auto px-48 py-10">
        <!-- Dynamic content will be loaded here -->
    </div>

    <!-- Footer -->
    <footer class="bg-white footer-shadow w-full px-12 py-5 flex items-center justify-center">
        <a href="https://github.com/namig7/vermicelli" target="_blank" rel="noopener noreferrer" class="flex items-center space-x-2">
            <img src="{{ url_for('static', filename='public/logo-vermicelli.svg') }}" alt="Vermicelli Logo" class="site-logo h-6 w-6 rounded-full">
            <span class="text-gray-600">© 2022-2026 Vermicelli</span>
        </a>
    </footer>
    <!-- Scripts -->
    <!-- Include jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <script>
        (function() {
            const themeMedia = window.matchMedia('(prefers-color-scheme: dark)');
            const themeButtons = document.querySelectorAll('.theme-toggle-button');
            const userMenuButton = document.getElementById('userMenuButton');
            const userMenuDropdown = document.getElementById('userMenuDropdown');

            function getSavedTheme() {
                const savedTheme = localStorage.getItem('themePreference');
                return savedTheme === 'dark' || savedTheme === 'light' || savedTheme === 'system' ? savedTheme : null;
            }

            function getDefaultTheme() {
                return themeMedia.matches ? 'dark' : 'light';
            }

            function resolveTheme(theme) {
                return theme === 'dark' || theme === 'light' ? theme : getDefaultTheme();
            }

            function applyTheme(theme) {
                const themeSetting = theme || getSavedTheme() || 'system';
                const activeTheme = resolveTheme(themeSetting);
                document.documentElement.dataset.theme = activeTheme;
                document.documentElement.style.colorScheme = activeTheme;
                themeButtons.forEach(function(button) {
                    const isActive = button.dataset.themeValue === themeSetting;
                    button.classList.toggle('active', isActive);
                    button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
                });
            }

            themeButtons.forEach(function(button) {
                button.addEventListener('click', function() {
                    const nextTheme = button.dataset.themeValue;
                    localStorage.setItem('themePreference', nextTheme);
                    applyTheme(nextTheme);
                });
            });

            if (themeMedia.addEventListener) {
                themeMedia.addEventListener('change', function() {
                    const savedTheme = getSavedTheme();
                    if (!savedTheme || savedTheme === 'system') {
                        applyTheme(savedTheme || 'system');
                    }
                });
            } else if (themeMedia.addListener) {
                themeMedia.addListener(function() {
                    const savedTheme = getSavedTheme();
                    if (!savedTheme || savedTheme === 'system') {
                        applyTheme(savedTheme || 'system');
                    }
                });
            }

            applyTheme();

            if (userMenuButton && userMenuDropdown) {
                function closeUserMenu() {
                    userMenuDropdown.classList.add('hidden');
                    userMenuButton.setAttribute('aria-expanded', 'false');
                }

                userMenuButton.addEventListener('click', function(event) {
                    event.stopPropagation();
                    const isOpen = !userMenuDropdown.classList.contains('hidden');
                    userMenuDropdown.classList.toggle('hidden', isOpen);
                    userMenuButton.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
                });

                userMenuDropdown.addEventListener('click', function(event) {
                    const link = event.target.closest('a');
                    if (link) {
                        closeUserMenu();
                    }
                });

                document.addEventListener('click', function(event) {
                    if (!userMenuDropdown.classList.contains('hidden') && !event.target.closest('.user-menu')) {
                        closeUserMenu();
                    }
                });

                document.addEventListener('keydown', function(event) {
                    if (event.key === 'Escape') {
                        closeUserMenu();
                    }
                });
            }
        })();

        // Define the loadPage function and attach it to the window object
        window.loadPage = function(page, appId = '', pushState = true) {
            // Set active tab
            $('.tab-link').removeClass('active');
            $(`.tab-link[data-page="${page}"]`).addClass('active');

            // Show loading indicator (optional)
            $('#content-area').html('<div class="flex justify-center items-center py-20"><div class="spinner"></div></div>');


            const url = page === 'application_details' && appId
                ? `/content/application_details/${appId}`
                : `/content/${page}`;

            // Load content
            $('#content-area').load(url, function(response, status, xhr) {
                if (status == "error") {
                    $('#content-area').html("<p>Error loading content.</p>");
                }
            });

            // Update browser history
            if (pushState) {
                if (page === 'application_details' && appId) {
                    history.pushState({page: page, appId: appId}, '', `/application/${appId}`);
                } else {
                    history.pushState({page: page}, '', `/${page}`);
                }
            }
        };

        // Document ready function
        $(document).ready(function() {
            // Handle navigation clicks
            $('.tab-link').click(function(e) {
                e.preventDefault();
                const page = $(this).data('page');
                window.loadPage(page);
            });

            // Handle guide and about page links
            $('nav a[data-page]').click(function(e) {
                e.preventDefault();
                const page = $(this).data('page');
                window.loadPage(page);
            });

            // Handle browser back/forward buttons
            window.onpopstate = function(event) {
                if (event.state && event.state.page) {
                    if (event.state.page === 'application_details') {
                        window.loadPage(event.state.page, event.state.appId, false);
                    } else {
                        window.loadPage(event.state.page, '', false);
                    }
                } else {
                    window.loadPage('applications', '', false); // Default page
                }
            };

            // Load initial page
            const initialPage = $('body').data('initial-page') || 'applications';
            const appId = $('body').data('app-id') || '';
            window.loadPage(initialPage, appId, false);
        });
    </script>

</body>
</html>
